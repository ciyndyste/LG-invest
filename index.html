<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LG Investissement | Connexion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .input-border { border: 1px solid #e5e7eb; }
        .lg-input:focus { border-color: #a1a1aa; outline: none; box-shadow: 0 0 0 1px #a1a1aa; }
    </style>
</head>
<body class="bg-white min-h-screen flex flex-col justify-between">

    <div class="p-6 pt-16 flex-grow flex flex-col items-center">
        
        <div class="mb-12 w-full max-w-[280px]">
            <div class="flex items-center gap-2">
                <div class="w-12 h-12 bg-[#a50034] rounded-full flex items-center justify-center font-bold text-white text-2xl">L</div>
                <h1 class="text-3xl font-black uppercase text-[#a50034]">LG <span class="font-normal text-gray-500">Invest</span></h1>
            </div>
        </div>

        <form id="loginForm" class="w-full max-w-[340px] space-y-5">
            
            <div class="text-left mb-2">
                <h2 class="text-xl font-bold text-gray-900">Bienvenue</h2>
                <p class="text-sm text-gray-500">Connectez-vous pour continuer</p>
            </div>

            <div class="input-border rounded-xl p-4 flex items-center gap-3 bg-white">
                <span class="font-medium text-gray-800">+243</span>
                <input type="tel" id="loginPhone" placeholder="Numéro de téléphone" 
                       class="w-full text-sm font-normal text-gray-900 focus:outline-none lg-input" required>
            </div>

            <div class="input-border rounded-xl p-4 flex items-center bg-white">
                <input type="password" id="loginPassword" placeholder="Votre mot de passe" 
                       class="w-full text-sm font-normal text-gray-900 focus:outline-none lg-input" required>
            </div>

            <div class="text-right">
                <a href="#" class="text-xs font-semibold text-gray-500 hover:text-black">Mot de passe oublié ?</a>
            </div>

            <button type="submit" id="loginBtn" 
                    class="w-full bg-black text-white p-5 rounded-full font-bold text-sm tracking-tight active:scale-95 transition-transform shadow-lg shadow-gray-200">
                Se connecter
            </button>

            <div class="relative py-4">
                <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-gray-100"></div></div>
                <div class="relative flex justify-center text-xs uppercase"><span class="bg-white px-2 text-gray-400">Ou</span></div>
            </div>

            <a href="register.html" 
               class="block w-full text-center input-border text-gray-900 p-4 rounded-full font-bold text-sm tracking-tight active:scale-95 transition-transform">
                Créer un nouveau compte
            </a>
        </form>

    </div>

    <div class="w-full max-w-[380px] mx-auto p-4 flex justify-center sticky bottom-0">
        <div class="input-border rounded-full p-3 pl-5 pr-1 flex items-center gap-2 bg-slate-50 w-full justify-between shadow-sm">
            <i class="fa-solid fa-lock text-gray-400 text-xs"></i>
            <span class="text-xs font-normal text-gray-900 tracking-tight">lg-invest.com</span>
            <div class="w-7 h-7 rounded-full bg-gray-200 flex items-center justify-center text-gray-600 text-sm">
                <i class="fa-solid fa-rotate-right"></i>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/js/all.min.css"></script>

    <script type="module">
        // La logique Firebase pour vérifier les identifiants ira ici
    </script>
</body>
</html>
