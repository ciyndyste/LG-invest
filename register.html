<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LG Investissement | Créer un compte</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .input-border { border: 1px solid #e5e7eb; }
        .lg-input:focus { border-color: #1e3a8a; outline: none; box-shadow: 0 0 0 1px #1e3a8a; }
    </style>
</head>
<body class="bg-white min-h-screen flex flex-col justify-between">

    <div class="p-6 pt-12 flex-grow flex flex-col items-center">
        
        <div class="mb-10 w-full max-w-[280px]">
            <div class="flex items-center gap-2">
                <div class="w-12 h-12 bg-[#a50034] rounded-full flex items-center justify-center font-bold text-white text-2xl">L</div>
                <h1 class="text-3xl font-black uppercase text-[#a50034]">LG <span class="font-normal text-gray-500">Invest</span></h1>
            </div>
        </div>

        <form id="registerForm" class="w-full max-w-[340px] space-y-4">
            <div class="input-border rounded-xl p-4 flex items-center gap-3 bg-white">
                <span class="font-medium text-gray-800">+243</span>
                <input type="tel" id="phone" placeholder="Numéro de téléphone" 
                       class="w-full text-sm font-normal text-gray-900 focus:outline-none lg-input" required>
            </div>

            <div class="input-border rounded-xl p-4 flex items-center bg-white">
                <input type="password" id="password" placeholder="Mot de passe" 
                       class="w-full text-sm font-normal text-gray-900 focus:outline-none lg-input" required>
            </div>

            <div class="input-border rounded-xl p-4 flex items-center bg-white">
                <input type="password" id="confirmPassword" placeholder="Répéter le mot de passe" 
                       class="w-full text-sm font-normal text-gray-900 focus:outline-none lg-input" required>
            </div>

            <div class="input-border rounded-xl p-4 flex items-center bg-white">
                <input type="text" id="inviteCode" placeholder="Code d'invitation" 
                       class="w-full text-sm font-medium text-gray-900 focus:outline-none lg-input" required>
            </div>

            <button type="submit" id="submitBtn" 
                    class="w-full bg-black text-white p-5 rounded-full font-bold text-sm tracking-tight active:scale-95 transition-transform">
                Créer un compte
            </button>

            <a href="index.html" 
               class="block w-full text-center input-border text-gray-900 p-4 rounded-full font-bold text-sm tracking-tight active:scale-95 transition-transform">
                J'ai déjà un compte, connectez-vous
            </a>
        </form>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSy...", 
            authDomain: "firstsolar-e2ba3.firebaseapp.com",
            databaseURL: "https://firstsolar-e2ba3-default-rtdb.firebaseio.com",
            projectId: "firstsolar-e2ba3",
            storageBucket: "firstsolar-e2ba3.appspot.com",
            messagingSenderId: "1036814046187",
            appId: "VOTRE_APP_ID"
        };

        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const database = firebase.database();

        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const codeFromUrl = urlParams.get('c');
            if (codeFromUrl) {
                // Conversion en minuscules lors de la lecture de l'URL
                document.getElementById('inviteCode').value = codeFromUrl.toLowerCase();
            }
        };

        function generateCode() {
            // Le nouveau code de l'utilisateur sera généré en minuscules
            return Math.random().toString(36).substring(2, 8).toLowerCase();
        }

        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const phone = document.getElementById('phone').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            // Conversion systématique en minuscules pour la recherche
            const inviteCodeSaisi = document.getElementById('inviteCode').value.trim().toLowerCase();
            const btn = document.getElementById('submitBtn');

            if (password !== confirmPassword) {
                alert("Les mots de passe ne correspondent pas");
                return;
            }

            btn.disabled = true;
            btn.innerText = "VÉRIFICATION EN COURS...";

            // 1. Recherche du parrain avec le code en minuscules
            database.ref('congo_petrole/users').orderByChild('inviteCode').equalTo(inviteCodeSaisi).once('value', snapshot => {
                
                // Vérification du code maître également en minuscules
                if (!snapshot.exists() && inviteCodeSaisi !== "ghehez") {
                    alert("Code d'invitation invalide !");
                    btn.disabled = false;
                    btn.innerText = "CRÉER UN COMPTE";
                    return;
                }

                let parrainLvl1 = null; 
                let parrainLvl1Key = null;

                if (snapshot.exists()) {
                    snapshot.forEach(child => {
                        parrainLvl1Key = child.key;
                        parrainLvl1 = child.val();
                    });
                }

                database.ref('congo_petrole/users').orderByChild('phone').equalTo(phone).once('value', userSnap => {
                    if (userSnap.exists()) {
                        alert("Ce numéro est déjà utilisé.");
                        btn.disabled = false;
                        btn.innerText = "CRÉER UN COMPTE";
                        return;
                    }

                    const monNouveauCode = generateCode(); // Généré en minuscules
                    const newUserRef = database.ref('congo_petrole/users').push();
                    
                    const userData = {
                        phone: phone,
                        password: password,
                        inviteCode: monNouveauCode, // Stocké en minuscules
                        parrain: inviteCodeSaisi,
                        parrainId: parrainLvl1Key || "SYSTEM",
                        solde: 1500,
                        revenu_cumule: 0,
                        teamSize: 0,
                        lvl1Count: 0,
                        lvl2Count: 0,
                        lvl3Count: 0,
                        dateInscription: new Date().toISOString()
                    };

                    newUserRef.set(userData).then(() => {
                        const updates = {};

                        if (parrainLvl1Key) {
                            updates[`congo_petrole/users/${parrainLvl1Key}/teamSize`] = (parrainLvl1.teamSize || 0) + 1;
                            updates[`congo_petrole/users/${parrainLvl1Key}/lvl1Count`] = (parrainLvl1.lvl1Count || 0) + 1;

                            if (parrainLvl1.parrainId && parrainLvl1.parrainId !== "SYSTEM") {
                                database.ref(`congo_petrole/users/${parrainLvl1.parrainId}`).once('value', snap2 => {
                                    if (snap2.exists()) {
                                        const p2 = snap2.val();
                                        updates[`congo_petrole/users/${parrainLvl1.parrainId}/teamSize`] = (p2.teamSize || 0) + 1;
                                        updates[`congo_petrole/users/${parrainLvl1.parrainId}/lvl2Count`] = (p2.lvl2Count || 0) + 1;

                                        if (p2.parrainId && p2.parrainId !== "SYSTEM") {
                                            database.ref(`congo_petrole/users/${p2.parrainId}`).once('value', snap3 => {
                                                if (snap3.exists()) {
                                                    const p3 = snap3.val();
                                                    updates[`congo_petrole/users/${p2.parrainId}/teamSize`] = (p3.teamSize || 0) + 1;
                                                    updates[`congo_petrole/users/${p2.parrainId}/lvl3Count`] = (p3.lvl3Count || 0) + 1;
                                                }
                                                database.ref().update(updates);
                                            });
                                        } else {
                                            database.ref().update(updates);
                                        }
                                    } else {
                                        database.ref().update(updates);
                                    }
                                });
                            } else {
                                database.ref().update(updates);
                            }
                        }

                        alert("Compte créé ! Votre code est : " + monNouveauCode);
                        localStorage.setItem('userPhone', phone);
                        window.location.href = "dashboard.html";
                        
                    }).catch(error => {
                        alert("Erreur : " + error.message);
                        btn.disabled = false;
                        btn.innerText = "CRÉER UN COMPTE";
                    });
                });
            });
        });
    </script>
</body>
</html>
