<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LG Investissement | Créer un compte</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .input-border { border: 1px solid #e5e7eb; }
        .lg-input:focus { border-color: #a1a1aa; outline: none; box-shadow: 0 0 0 1px #a1a1aa; }
    </style>
</head>
<body class="bg-white min-h-screen flex flex-col justify-between">

    <div class="p-6 pt-12 flex-grow flex flex-col items-center">
        
        <div class="mb-10 w-full max-w-[280px]">
            <div class="flex items-center gap-2">
                <div class="w-12 h-12 bg-[#a50034] rounded-full flex items-center justify-center font-bold text-white text-2xl">L</div>
                <h1 class="text-3xl font-black uppercase text-[#a50034]">LG <span class="font-normal text-gray-500">Invest</span></h1>
            </div>
        </div>

        <form id="registerForm" class="w-full max-w-[340px] space-y-4">
            <div class="input-border rounded-xl p-4 flex items-center gap-3 bg-white">
                <span class="font-medium text-gray-800">+243</span>
                <input type="tel" id="phone" placeholder="Numéro de téléphone" 
                       class="w-full text-sm font-normal text-gray-900 focus:outline-none lg-input" required>
            </div>

            <div class="input-border rounded-xl p-4 flex items-center bg-white">
                <input type="password" id="password" placeholder="Mot de passe" 
                       class="w-full text-sm font-normal text-gray-900 focus:outline-none lg-input" required>
            </div>

            <div class="input-border rounded-xl p-4 flex items-center bg-white">
                <input type="password" id="confirmPassword" placeholder="Répéter le mot de passe" 
                       class="w-full text-sm font-normal text-gray-900 focus:outline-none lg-input" required>
            </div>

            <div class="input-border rounded-xl p-4 flex items-center bg-white">
                <input type="text" id="inviteCode" placeholder="Code d'invitation" 
                       class="w-full text-sm font-medium text-gray-900 uppercase focus:outline-none lg-input" required>
            </div>

            <button type="submit" id="submitBtn" 
                    class="w-full bg-black text-white p-5 rounded-full font-bold text-sm tracking-tight active:scale-98 transition-transform">
                Créer un compte
            </button>

            <a href="index.html" 
               class="block w-full text-center input-border text-gray-900 p-4 rounded-full font-bold text-sm tracking-tight active:scale-98 transition-transform">
                J'ai déjà un compte, connectez-vous
            </a>
        </form>
    </div>

    <script>
        // CONFIGURATION CONGO PÉTROLE
        const firebaseConfig = {
            apiKey: "AIzaSy...", // Ta clé API
            authDomain: "firstsolar-e2ba3.firebaseapp.com",
            databaseURL: "https://firstsolar-e2ba3-default-rtdb.firebaseio.com",
            projectId: "firstsolar-e2ba3",
            storageBucket: "firstsolar-e2ba3.appspot.com",
            messagingSenderId: "1036814046187",
            appId: "VOTRE_APP_ID"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const phone = document.getElementById('phone').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const inviteCode = document.getElementById('inviteCode').value;
            const btn = document.getElementById('submitBtn');

            if (password !== confirmPassword) {
                alert("Les mots de passe ne correspondent pas");
                return;
            }

            btn.disabled = true;
            btn.innerText = "INSCRIPTION EN COURS...";

            // Vérifier si le numéro existe déjà dans Congo Pétrole
            database.ref('congo_petrole/users').orderByChild('phone').equalTo(phone).once('value', snapshot => {
                if (snapshot.exists()) {
                    alert("Ce numéro est déjà utilisé sur Congo Pétrole.");
                    btn.disabled = false;
                    btn.innerText = "CRÉER UN COMPTE";
                } else {
                    // Création du compte dans le dossier congo_petrole/users
                    const newUserRef = database.ref('congo_petrole/users').push();
                    newUserRef.set({
                        phone: phone,
                        password: password,
                        inviteCode: inviteCode,
                        solde: 1500, // Bonus de 1500 FC offert comme prévu
                        revenu_cumule: 0,
                        dateInscription: new Date().toISOString()
                    }).then(() => {
                        alert("Compte LG Invest créé avec succès !");
                        localStorage.setItem('userPhone', phone);
                        window.location.href = "dashboard.html";
                    }).catch(error => {
                        alert("Erreur: " + error.message);
                        btn.disabled = false;
                    });
                }
            });
        });
    </script>
</body>
</html>
