<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LG Invest | Recharge Sécurisée</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .step-hidden { display: none; }
        .active-card { border: 2px solid #1e3a8a; background-color: #eff6ff; }
        .network-card { border: 2px solid transparent; transition: 0.3s; cursor: pointer; }
        .network-selected { border-color: #a50034; background-color: #fff1f2; }
    </style>
</head>
<body class="pb-10">

    <div class="bg-white p-4 flex items-center gap-4 border-b sticky top-0 z-50">
        <button onclick="prevStep()" id="backBtn" class="text-gray-600"><i class="fa-solid fa-chevron-left"></i></button>
        <h1 class="text-lg font-bold text-gray-900" id="stepTitle">Recharger (1/3)</h1>
    </div>

    <div id="step1" class="p-4 space-y-4">
        <p class="text-sm font-bold text-gray-500 uppercase tracking-widest text-center">Sélectionnez votre pack VIP</p>
        <div class="grid grid-cols-2 gap-3">
            <button onclick="selectVIP(20000, 'VIP 1')" class="bg-white p-4 rounded-2xl shadow-sm border font-black text-gray-800 focus:active-card">VIP 1<br><span class="text-[10px] font-bold text-blue-600">FC 20,000</span></button>
            <button onclick="selectVIP(40000, 'VIP 2')" class="bg-white p-4 rounded-2xl shadow-sm border font-black text-gray-800 focus:active-card">VIP 2<br><span class="text-[10px] font-bold text-blue-600">FC 40,000</span></button>
            <button onclick="selectVIP(75000, 'VIP 3')" class="bg-white p-4 rounded-2xl shadow-sm border font-black text-gray-800 focus:active-card">VIP 3<br><span class="text-[10px] font-bold text-blue-600">FC 75,000</span></button>
            <button onclick="selectVIP(120000, 'VIP 4')" class="bg-white p-4 rounded-2xl shadow-sm border font-black text-gray-800 focus:active-card">VIP 4<br><span class="text-[10px] font-bold text-blue-600">FC 120,000</span></button>
            <button onclick="selectVIP(250000, 'VIP 5')" class="bg-white p-4 rounded-2xl shadow-sm border font-black text-gray-800 focus:active-card">VIP 5<br><span class="text-[10px] font-bold text-blue-600">FC 250,000</span></button>
            <button onclick="selectVIP(400000, 'VIP 6')" class="bg-white p-4 rounded-2xl shadow-sm border font-black text-gray-800 focus:active-card">VIP 6<br><span class="text-[10px] font-bold text-blue-600">FC 400,000</span></button>
            <button onclick="selectVIP(800000, 'VIP 7')" class="bg-white p-4 rounded-2xl shadow-sm border font-black text-gray-800 focus:active-card">VIP 7<br><span class="text-[10px] font-bold text-blue-600">FC 800,000</span></button>
            <button onclick="selectVIP(1200000, 'VIP 8')" class="bg-white p-4 rounded-2xl shadow-sm border font-black text-gray-800 focus:active-card">VIP 8<br><span class="text-[10px] font-bold text-blue-600">FC 1,200,000</span></button>
        </div>
    </div>

    <div id="step2" class="step-hidden p-4 space-y-6">
        <div class="bg-blue-50 p-4 rounded-xl text-center">
            <p class="text-xs font-bold text-blue-600 uppercase">Montant sélectionné</p>
            <h2 id="selectedAmountDisplay" class="text-2xl font-black text-blue-900 italic">FC 0</h2>
        </div>
        
        <p class="text-sm font-bold text-gray-500 uppercase text-center">Choisissez votre opérateur</p>
        <div class="space-y-3">
            <div onclick="selectNetwork('Vodacom (M-Pesa)', '0824661307')" class="network-card bg-white p-5 rounded-2xl flex items-center gap-4 shadow-sm">
                <div class="w-12 h-12 bg-red-600 rounded-full flex items-center justify-center text-white font-bold">M</div>
                <span class="font-black text-gray-700">M-PESA / VODACOM</span>
            </div>
            <div onclick="selectNetwork('Orange Money', '0852771755')" class="network-card bg-white p-5 rounded-2xl flex items-center gap-4 shadow-sm">
                <div class="w-12 h-12 bg-orange-500 rounded-full flex items-center justify-center text-white font-bold">O</div>
                <span class="font-black text-gray-700">ORANGE MONEY</span>
            </div>
            <div onclick="selectNetwork('Airtel Money', '0993378166')" class="network-card bg-white p-5 rounded-2xl flex items-center gap-4 shadow-sm">
                <div class="w-12 h-12 bg-red-500 rounded-full flex items-center justify-center text-white font-bold">A</div>
                <span class="font-black text-gray-700">AIRTEL MONEY</span>
            </div>
        </div>
    </div>

    <div id="step3" class="step-hidden p-4 space-y-6">
        <div class="bg-white p-6 rounded-[2rem] shadow-xl border-t-4 border-blue-600">
            <p class="text-center text-xs font-black text-gray-400 uppercase mb-4">Instructions de transfert</p>
            <div class="space-y-4 text-center">
                <p class="text-sm font-medium">Veuillez envoyer <b id="finalAmount" class="text-blue-600">0 FC</b> sur le numéro suivant :</p>
                <div class="bg-gray-100 p-4 rounded-xl flex items-center justify-between">
                    <span id="targetNumber" class="text-xl font-black tracking-widest text-gray-800">0800000000</span>
                    <button onclick="copyNumber()" class="text-blue-600 font-bold text-xs bg-white px-3 py-1 rounded-lg shadow-sm">COPIER</button>
                </div>
                <p class="text-[10px] text-red-500 font-bold italic">Réseau : <span id="finalNetwork">---</span></p>
            </div>
        </div>

        <div class="bg-white p-6 rounded-[2rem] shadow-sm space-y-4">
            <p class="text-xs font-black text-gray-400 uppercase">Confirmation du transfert</p>
            <input type="text" id="senderPhone" placeholder="Votre numéro expéditeur" class="w-full p-4 bg-gray-50 border border-gray-100 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-600 font-bold">
            <input type="text" id="transactionId" placeholder="ID de transaction / ID de référence" class="w-full p-4 bg-gray-50 border border-gray-100 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-600 font-bold">
            
            <button onclick="submitRecharge()" class="w-full bg-[#a50034] text-white p-5 rounded-2xl font-black text-xs uppercase tracking-widest shadow-lg active:scale-95 transition-transform">
                VALIDER LA RECHARGE
            </button>
        </div>
    </div>

    <script>
        let currentStep = 1;
        let rechargeData = { amount: 0, vip: '', network: '', target: '' };

        function selectVIP(amount, vipName) {
            rechargeData.amount = amount;
            rechargeData.vip = vipName;
            goToStep(2);
        }

        function selectNetwork(name, number) {
            rechargeData.network = name;
            rechargeData.target = number;
            goToStep(3);
        }

        function goToStep(step) {
            document.getElementById(`step${currentStep}`).classList.add('step-hidden');
            currentStep = step;
            document.getElementById(`step${currentStep}`).classList.remove('step-hidden');
            
            // Mise à jour interface
            document.getElementById('stepTitle').innerText = `Recharger (${currentStep}/3)`;
            if(step === 2) {
                document.getElementById('selectedAmountDisplay').innerText = `FC ${rechargeData.amount.toLocaleString()}`;
            }
            if(step === 3) {
                document.getElementById('finalAmount').innerText = `FC ${rechargeData.amount.toLocaleString()}`;
                document.getElementById('targetNumber').innerText = rechargeData.target;
                document.getElementById('finalNetwork').innerText = rechargeData.network;
            }
        }

        function prevStep() {
            if(currentStep > 1) goToStep(currentStep - 1);
            else window.location.href = 'dashboard.html';
        }

        function copyNumber() {
            const num = document.getElementById('targetNumber').innerText;
            navigator.clipboard.writeText(num);
            alert("Numéro copié !");
        }

        function submitRecharge() {
            const sender = document.getElementById('senderPhone').value;
            const tid = document.getElementById('transactionId').value;

            if(!sender || !tid) {
                alert("Veuillez remplir tous les champs de confirmation.");
                return;
            }

            const payload = {
                ...rechargeData,
                senderPhone: sender,
                transactionID: tid,
                status: 'En attente',
                date: new Date().toLocaleString()
            };

            console.log("Données envoyées à l'admin:", payload);
            alert("Demande envoyée avec succès ! Votre solde sera mis à jour après vérification par l'administrateur.");
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
