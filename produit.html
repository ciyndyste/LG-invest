<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LG Invest | Produits</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .bg-lg-blue { background-color: #1e3a8a; }
        .product-card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .btn-buy { background: #f36f21; color: white; transition: 0.3s; }
        .btn-buy:active { scale: 0.95; }
    </style>
</head>
<body class="pb-32">

    <div class="relative h-60 bg-lg-blue overflow-hidden">
        <img src="IMG_4253.jpeg" class="absolute inset-0 w-full h-full object-cover opacity-30">
        <div class="absolute inset-0 p-6 flex flex-col justify-end">
            <div class="flex gap-4 mb-4">
                <div onclick="window.location.href='mes_produits.html'" class="bg-white/20 backdrop-blur-md rounded-xl p-3 flex-1 border border-white/10 cursor-pointer active:bg-white/30">
                    <p class="text-white text-[10px] uppercase font-bold opacity-80">Total des produits</p>
                    <p class="text-white text-xl font-black" id="totalProductsCount">0</p>
                </div>
                <div class="bg-white/20 backdrop-blur-md rounded-xl p-3 flex-1 border border-white/10">
                    <p class="text-white text-[10px] uppercase font-bold opacity-80">Bénéfice du produit</p>
                    <p class="text-white text-xl font-black" id="totalProfit">FC 0</p>
                </div>
            </div>
            <h2 class="text-white font-black italic tracking-widest uppercase">LG ELECTRICAL APPLIANCES</h2>
        </div>
    </div>

    <div class="p-4 space-y-4" id="productList">
        <div class="product-card p-4 flex gap-4 items-center">
            <img src="IMG_4247.jpeg" class="w-24 h-24 object-contain bg-gray-50 rounded-lg p-1">
            <div class="flex-grow">
                <div class="flex justify-between items-center mb-1">
                    <h3 class="text-xl font-black text-orange-600 italic tracking-tighter">VIP 1</h3>
                    <button onclick="buyProduct('VIP 1', 20000, 4600)" class="btn-buy px-5 py-1.5 rounded-full text-xs font-black uppercase">Acheter</button>
                </div>
                <div class="text-[11px] grid grid-cols-2 gap-y-1 font-bold text-gray-500">
                    <p>Prix: <span class="text-orange-600">FC 20 000</span></p>
                    <p>Durée: <span class="text-orange-600">45 Jours</span></p>
                    <p>Journalier: <span class="text-orange-600">FC 4 600</span></p>
                    <p>Total: <span class="text-orange-600">FC 207 000</span></p>
                </div>
            </div>
        </div>

        <div class="product-card p-4 flex gap-4 items-center">
            <img src="IMG_4248.jpeg" class="w-24 h-24 object-contain bg-gray-50 rounded-lg p-1">
            <div class="flex-grow">
                <div class="flex justify-between items-center mb-1">
                    <h3 class="text-xl font-black text-orange-600 italic tracking-tighter">VIP 2</h3>
                    <button onclick="buyProduct('VIP 2', 40000, 9200)" class="btn-buy px-5 py-1.5 rounded-full text-xs font-black uppercase">Acheter</button>
                </div>
                <div class="text-[11px] grid grid-cols-2 gap-y-1 font-bold text-gray-500">
                    <p>Prix: <span class="text-orange-600">FC 40 000</span></p>
                    <p>Durée: <span class="text-orange-600">45 Jours</span></p>
                    <p>Journalier: <span class="text-orange-600">FC 9 200</span></p>
                    <p>Total: <span class="text-orange-600">FC 414 000</span></p>
                </div>
            </div>
        </div>
        
        </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-lg-blue border-t border-white/10 flex justify-around p-3 z-50">
        <a href="dashboard.html" class="flex flex-col items-center gap-1 text-white/50">
            <i class="fa-solid fa-house text-xl"></i>
            <span class="text-[10px] font-bold uppercase">Maison</span>
        </a>
        <a href="produit.html" class="flex flex-col items-center gap-1 text-orange-500">
            <i class="fa-solid fa-bag-shopping text-xl"></i>
            <span class="text-[10px] font-bold uppercase">Produit</span>
        </a>
        <a href="equipe.html" class="flex flex-col items-center gap-1 text-white/50">
            <i class="fa-solid fa-gift text-xl"></i>
            <span class="text-[10px] font-bold uppercase">Équipe</span>
        </a>
        <a href="profil.html" class="flex flex-col items-center gap-1 text-white/50">
            <i class="fa-solid fa-user text-xl"></i>
            <span class="text-[10px] font-bold uppercase">Le mien</span>
        </a>
    </nav>

    <script>
        // CONFIGURATION CONGO PÉTROLE
        const firebaseConfig = {
            apiKey: "AIzaSy...", 
            authDomain: "firstsolar-e2ba3.firebaseapp.com",
            databaseURL: "https://firstsolar-e2ba3-default-rtdb.firebaseio.com",
            projectId: "firstsolar-e2ba3",
            storageBucket: "firstsolar-e2ba3.appspot.com",
            messagingSenderId: "1036814046187",
            appId: "VOTRE_APP_ID"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const database = firebase.database();
        const userPhone = localStorage.getItem('userPhone');

        if (!userPhone) {
            window.location.href = "index.html";
        }

        // 1. Compter les produits et bénéfices en temps réel
        database.ref('congo_petrole/mes_produits').orderByChild('userPhone').equalTo(userPhone).on('value', snapshot => {
            let count = 0;
            let totalEarned = 0;
            if (snapshot.exists()) {
                count = snapshot.numChildren();
                snapshot.forEach(child => {
                    totalEarned += (child.val().totalAccumule || 0);
                });
            }
            document.getElementById('totalProductsCount').innerText = count;
            document.getElementById('totalProfit').innerText = 'FC ' + totalEarned.toLocaleString();
        });

        // 2. Fonction d'achat
        function buyProduct(name, price, daily) {
            if (!confirm(`Confirmer l'achat du ${name} pour FC ${price} ?`)) return;

            // Vérifier le solde dans congo_petrole/users
            database.ref('congo_petrole/users').orderByChild('phone').equalTo(userPhone).once('value', snapshot => {
                let userKey, userData;
                snapshot.forEach(child => {
                    userKey = child.key;
                    userData = child.val();
                });

                if (userData.solde >= price) {
                    const newSolde = userData.solde - price;

                    // Mise à jour solde
                    database.ref('congo_petrole/users/' + userKey).update({ solde: newSolde });

                    // Ajout du produit dans mes_produits
                    database.ref('congo_petrole/mes_produits').push({
                        userPhone: userPhone,
                        nom: name,
                        prix: price,
                        gainJournalier: daily,
                        totalAccumule: 0,
                        dateAchat: new Date().toISOString(),
                        expireLe: new Date(Date.now() + 45 * 24 * 60 * 60 * 1000).toISOString()
                    });

                    alert("Achat réussi ! Félicitations.");
                } else {
                    alert("Solde insuffisant. Veuillez recharger votre compte.");
                }
            });
        }
    </script>
</body>
</html>
