<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LG Invest | Historique</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .tab-active { color: #1e3a8a; border-bottom: 3px solid #1e3a8a; }
        .status-pending { background-color: #fef3c7; color: #d97706; }
        .status-success { background-color: #d1fae5; color: #059669; }
        .status-failed { background-color: #fee2e2; color: #dc2626; }
    </style>
</head>
<body class="pb-10">

    <div class="bg-white p-4 flex items-center gap-4 border-b sticky top-0 z-50">
        <a href="profil.html" class="text-gray-600"><i class="fa-solid fa-chevron-left"></i></a>
        <h1 class="text-lg font-bold text-gray-900">Historique du compte</h1>
    </div>

    <div class="bg-white flex shadow-sm">
        <button onclick="switchTab('recharge')" id="btn-recharge" class="flex-1 py-4 text-sm font-black uppercase tracking-widest tab-active transition-all">
            Recharges
        </button>
        <button onclick="switchTab('retrait')" id="btn-retrait" class="flex-1 py-4 text-sm font-black uppercase tracking-widest text-gray-400 transition-all">
            Retraits
        </button>
    </div>

    <div class="p-4">
        
        <div id="list-recharge" class="space-y-3">
            <div class="flex flex-col items-center justify-center py-24 text-center opacity-40">
                <div class="w-20 h-20 bg-gray-200 rounded-full flex items-center justify-center mb-4">
                    <i class="fa-solid fa-file-invoice-dollar text-3xl text-gray-400"></i>
                </div>
                <p class="font-black text-xs uppercase tracking-widest text-gray-900">Aucune recharge</p>
                <p class="text-[10px] font-bold text-gray-500 mt-1">Vos transactions de dépôt apparaîtront ici.</p>
            </div>
        </div>

        <div id="list-retrait" class="hidden space-y-3">
            <div class="flex flex-col items-center justify-center py-24 text-center opacity-40">
                <div class="w-20 h-20 bg-gray-200 rounded-full flex items-center justify-center mb-4">
                    <i class="fa-solid fa-clock-rotate-left text-3xl text-gray-400"></i>
                </div>
                <p class="font-black text-xs uppercase tracking-widest text-gray-900">Aucun retrait</p>
                <p class="text-[10px] font-bold text-gray-500 mt-1">Vos demandes de retrait apparaîtront ici.</p>
            </div>
        </div>

    </div>

    <script>
        function switchTab(type) {
            const btnRecharge = document.getElementById('btn-recharge');
            const btnRetrait = document.getElementById('btn-retrait');
            const listRecharge = document.getElementById('list-recharge');
            const listRetrait = document.getElementById('list-retrait');

            if (type === 'recharge') {
                btnRecharge.classList.add('tab-active');
                btnRecharge.classList.remove('text-gray-400');
                btnRetrait.classList.remove('tab-active');
                btnRetrait.classList.add('text-gray-400');
                
                listRecharge.classList.remove('hidden');
                listRetrait.classList.add('hidden');
            } else {
                btnRetrait.classList.add('tab-active');
                btnRetrait.classList.remove('text-gray-400');
                btnRecharge.classList.remove('tab-active');
                btnRecharge.classList.add('text-gray-400');
                
                listRetrait.classList.remove('hidden');
                listRecharge.classList.add('hidden');
            }
        }

        // Note pour le futur : 
        // Quand vous aurez des données, vous utiliserez innerHTML pour remplacer le contenu 
        // des divs 'list-recharge' et 'list-retrait'.
    </script>
</body>
</html>
