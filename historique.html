<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LG Invest | Historique</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .tab-active { color: #1e3a8a; border-bottom: 3px solid #1e3a8a; }
        .status-badge { font-size: 9px; font-weight: 900; padding: 4px 10px; border-radius: 6px; text-transform: uppercase; }
        .status-pending { background-color: #fef3c7; color: #d97706; }
        .status-success { background-color: #d1fae5; color: #059669; }
        .status-failed { background-color: #fee2e2; color: #dc2626; }
        .hist-card { background: white; border-radius: 15px; padding: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.03); }
    </style>
</head>
<body class="pb-10">

    <div class="bg-white p-4 flex items-center gap-4 border-b sticky top-0 z-50">
        <a href="profil.html" class="text-gray-600"><i class="fa-solid fa-chevron-left"></i></a>
        <h1 class="text-lg font-bold text-gray-900">Historique du compte</h1>
    </div>

    <div class="bg-white flex shadow-sm">
        <button onclick="switchTab('recharge')" id="btn-recharge" class="flex-1 py-4 text-sm font-black uppercase tracking-widest tab-active transition-all">
            Recharges
        </button>
        <button onclick="switchTab('retrait')" id="btn-retrait" class="flex-1 py-4 text-sm font-black uppercase tracking-widest text-gray-400 transition-all">
            Retraits
        </button>
    </div>

    <div class="p-4">
        <div id="list-recharge" class="space-y-3">
            <p class="text-center text-gray-400 py-10 text-xs">Chargement des transactions...</p>
        </div>

        <div id="list-retrait" class="hidden space-y-3">
            <p class="text-center text-gray-400 py-10 text-xs">Chargement des transactions...</p>
        </div>
    </div>

    <script>
        // CONFIGURATION FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSy...", 
            authDomain: "firstsolar-e2ba3.firebaseapp.com",
            databaseURL: "https://firstsolar-e2ba3-default-rtdb.firebaseio.com",
            projectId: "firstsolar-e2ba3",
            storageBucket: "firstsolar-e2ba3.appspot.com",
            messagingSenderId: "1036814046187",
            appId: "VOTRE_APP_ID"
        };

        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const database = firebase.database();
        const userPhone = localStorage.getItem('userPhone');

        function switchTab(type) {
            const btnRecharge = document.getElementById('btn-recharge');
            const btnRetrait = document.getElementById('btn-retrait');
            const listRecharge = document.getElementById('list-recharge');
            const listRetrait = document.getElementById('list-retrait');

            if (type === 'recharge') {
                btnRecharge.classList.add('tab-active'); btnRecharge.classList.remove('text-gray-400');
                btnRetrait.classList.remove('tab-active'); btnRetrait.classList.add('text-gray-400');
                listRecharge.classList.remove('hidden'); listRetrait.classList.add('hidden');
            } else {
                btnRetrait.classList.add('tab-active'); btnRetrait.classList.remove('text-gray-400');
                btnRecharge.classList.remove('tab-active'); btnRecharge.classList.add('text-gray-400');
                listRetrait.classList.remove('hidden'); listRecharge.classList.add('hidden');
            }
        }

        function getStatusClass(status) {
            if (status === "Succès") return "status-success";
            if (status === "Échoué") return "status-failed";
            return "status-pending";
        }

        // CHARGEMENT DES RECHARGES
        database.ref('congo_petrole/recharges_en_attente').orderByChild('userPhone').equalTo(userPhone).on('value', snapshot => {
            const list = document.getElementById('list-recharge');
            list.innerHTML = "";
            if (!snapshot.exists()) {
                list.innerHTML = `<div class="text-center py-20 opacity-40"><i class="fa-solid fa-file-circle-exclamation text-3xl mb-2"></i><p class="text-xs font-bold uppercase">Aucune recharge</p></div>`;
                return;
            }
            snapshot.forEach(child => {
                const data = child.val();
                list.insertAdjacentHTML('afterbegin', `
                    <div class="hist-card border-l-4 border-blue-900">
                        <div class="flex justify-between items-start mb-2">
                            <span class="text-[10px] font-black text-gray-400">${new Date(data.date).toLocaleDateString()}</span>
                            <span class="status-badge ${getStatusClass(data.status)}">${data.status}</span>
                        </div>
                        <div class="flex justify-between items-end">
                            <div>
                                <p class="text-sm font-black text-gray-800">Dépôt ${data.reseau}</p>
                                <p class="text-[9px] text-gray-400 font-bold uppercase">ID: ${data.transactionID}</p>
                            </div>
                            <p class="text-lg font-black italic text-gray-900">FC ${data.montant.toLocaleString()}</p>
                        </div>
                    </div>
                `);
            });
        });

        // CHARGEMENT DES RETRAITS
        database.ref('congo_petrole/retraits_en_attente').orderByChild('userPhone').equalTo(userPhone).on('value', snapshot => {
            const list = document.getElementById('list-retrait');
            list.innerHTML = "";
            if (!snapshot.exists()) {
                list.innerHTML = `<div class="text-center py-20 opacity-40"><i class="fa-solid fa-clock-rotate-left text-3xl mb-2"></i><p class="text-xs font-bold uppercase">Aucun retrait</p></div>`;
                return;
            }
            snapshot.forEach(child => {
                const data = child.val();
                list.insertAdjacentHTML('afterbegin', `
                    <div class="hist-card border-l-4 border-red-600">
                        <div class="flex justify-between items-start mb-2">
                            <span class="text-[10px] font-black text-gray-400">${data.date.split(',')[0]}</span>
                            <span class="status-badge ${getStatusClass(data.status)}">${data.status}</span>
                        </div>
                        <div class="flex justify-between items-end">
                            <div>
                                <p class="text-sm font-black text-gray-800">Retrait ${data.reseau}</p>
                                <p class="text-[9px] text-gray-400 font-bold uppercase">Vers: ${data.numeroReception}</p>
                            </div>
                            <div class="text-right">
                                <p class="text-lg font-black italic text-red-600">- FC ${data.montantBrut.toLocaleString()}</p>
                                <p class="text-[8px] font-bold text-gray-400 uppercase">Frais 15% inclus</p>
                            </div>
                        </div>
                    </div>
                `);
            });
        });
    </script>
</body>
</html>
